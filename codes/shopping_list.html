<!--
    Lista de compras onde vou escrevendo e os itens vão aparecendo na tela;
    não aceita itens iguais; 
    não tem limite até que eu dê enter com o campo vazio
-->

<meta charset = "UTF-8">

<center><h1>SUA LISTA DE COMPRAS</h1>
<hr>
<br>
<input/> <button>Clique aqui para adicionar</button>
</center>

<script>

    var list = []; // vetor que vai receber os itens
    var item = document.querySelector("input");
    item.focus(); 

    var existe = false;

    function verifica() { // verificar se já tem na lista antes de adicionar na lista

        for(var posicao = 1; posicao < list.length; posicao++) { // estrutura de repetição

            if(list[posicao] == item) { // não adiciona se for igual
                existe = true;
                break;
            }
        } 

        if(existe == false) {

            list.push(item);

        }
        
    }

    var button = document.querySelector("button");
    button.onclick = verifica; 

    document.write(list);
    document.write("<br>");

    console.log(list);

</script>
